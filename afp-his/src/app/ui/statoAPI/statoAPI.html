@let srv = SystemStatus.statoAPI().service;
@let db = SystemStatus.statoAPI().database;
@let uptime = SystemStatus.statoAPI().uptime;

<ul>
    <li>Service:
        <p-tag [severity]="srv == 'UP' ? 'success' : 'danger'" 
                value="{{ srv }}" />
    </li>
    <li>Database:
        <p-tag [severity]="db === 'CONNECTED' ? 'success' : 'danger'" 
                value="{{ db}}" />
    </li>
    <li>Uptime:
        <p-tag [severity]="uptime>0 ? 'success' : 'danger'" 
                value="{{ uptime}}" />
    </li>
    <li>
        <p-button pButton label="Refresh" (onClick)="SystemStatus.fetchStatoAPI()"></p-button>
    </li>
</ul>
